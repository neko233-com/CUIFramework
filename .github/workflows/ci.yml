name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        preset: [win-x64-debug, win-x64-release]
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j 2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cui-${{ matrix.preset }}
          path: build/windows-*/bin/*/
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        preset: [linux-x64-debug, linux-x64-release]
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxi-dev libasound2-dev \
            libpulse-dev pkg-config libfreetype-dev

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j $(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cui-${{ matrix.preset }}
          path: build/linux-*/bin/*/
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        preset: [macos-arm64-debug, macos-arm64-release]
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install pkg-config freetype

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j $(sysctl -n hw.ncpu)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cui-${{ matrix.preset }}
          path: build/macos-*/bin/*/
          retention-days: 7
