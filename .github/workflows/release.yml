name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        preset: [win-x64-release]
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j 2

      - name: Package
        run: |
          cd build/windows-x64/bin/Release
          7z a -tzip ../../../CUIFramework-windows-x64.zip *.exe *.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cui-windows-x64
          path: build/CUIFramework-*.zip

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        preset: [linux-x64-release]
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
            libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxi-dev libasound2-dev \
            libpulse-dev pkg-config libfreetype-dev

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j $(nproc)

      - name: Package
        run: |
          cd build/linux-x64/bin/Release
          tar czf ../../../../CUIFramework-linux-x64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cui-linux-x64
          path: build/CUIFramework-*.tar.gz

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        preset: [macos-arm64-release]
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install pkg-config freetype

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j $(sysctl -n hw.ncpu)

      - name: Package
        run: |
          cd build/macos-arm64/bin/Release
          tar czf ../../../../CUIFramework-macos-arm64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cui-macos-arm64
          path: build/CUIFramework-*.tar.gz

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cui-*/CUIFramework-*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
